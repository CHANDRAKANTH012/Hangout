<script crossorigin="" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
        // Map Initialization
        const map = L.map('map', {
            zoomControl: false,
            attributionControl: false
        }).setView([40.7128, -74.0060], 13);

        // Light Theme Tiles
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            maxZoom: 19
        }).addTo(map);

        // Custom Marker Logic
        const createCustomMarker = (emoji, lat, lng, title) => {
            const icon = L.divIcon({
                className: 'custom-div-icon',
                html: `
                    <div class="w-10 h-10 rounded-full sunrise-gradient flex items-center justify-center text-white text-xl shadow-xl marker-glow border-2 border-white hover:scale-125 transition-transform duration-300">
                        ${emoji}
                    </div>
                `,
                iconSize: [40, 40],
                iconAnchor: [20, 40]
            });

            const marker = L.marker([lat, lng], { icon }).addTo(map);
            
            const popupContent = `
                <div class="glass-panel w-[280px] p-5 rounded-lg overflow-hidden border-2 border-white/60">
                    <div class="flex items-center gap-3 mb-4">
                        <img src="image-user-small.jpg" class="w-10 h-10 rounded-full border-2 border-primary/20" data-alt="Detailed close-up portrait of a smiling young person with vibrant energy, natural light, urban background with soft bokeh, high-end photography style consistent with a modern community app.">
                        <div>
                            <p class="font-bold text-on-surface">${title}</p>
                            <p class="text-[12px] text-on-surface-variant">0.4 km away • Chill Vibe</p>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <div class="flex justify-between text-[11px] font-bold mb-1">
                            <span class="text-primary">4 Joined</span>
                            <span class="text-on-surface-variant">Capacity: 10</span>
                        </div>
                        <div class="w-full bg-white/30 h-1.5 rounded-full overflow-hidden">
                            <div class="bg-primary h-full w-[40%]"></div>
                        </div>
                    </div>

                    <div class="flex gap-2">
                        <button class="flex-1 py-2 rounded-full border border-primary text-primary font-bold text-[12px] hover:bg-primary/5 transition-all">Details</button>
                        <button class="flex-1 py-2 rounded-full bg-primary text-white font-bold text-[12px] shadow-md shimmer-btn">Join Now</button>
                    </div>
                </div>
            `;

            marker.bindPopup(popupContent, {
                className: 'custom-popup',
                offset: [0, -30]
            });

            marker.on('click', function() {
                map.flyTo([lat, lng], 15, {
                    duration: 1.5
                });
            });

            return marker;
        };

        // Add dummy markers
        createCustomMarker('☕', 40.7128, -74.0060, 'Coffee & Code');
        createCustomMarker('📸', 40.7200, -74.0100, 'Sunset Shots');
        createCustomMarker('🏀', 40.7050, -73.9980, 'Pickup Game');
        createCustomMarker('🎨', 40.7150, -74.0150, 'Sketching Session');

        // Panel Toggle Logic
        const panel = document.getElementById('side-panel');
        const search = document.getElementById('search-container');
        const toggleBtn = document.getElementById('toggle-panel');
        const toggleIcon = toggleBtn.querySelector('.material-symbols-outlined');
        let isPanelOpen = true;

        toggleBtn.addEventListener('click', () => {
            isPanelOpen = !isPanelOpen;
            if (isPanelOpen) {
                panel.style.transform = 'translateX(0)';
                search.style.left = '400px';
                toggleIcon.innerText = 'chevron_left';
            } else {
                panel.style.transform = 'translateX(-370px)';
                search.style.left = '40px';
                toggleIcon.innerText = 'chevron_right';
            }
        });

        // Atmospheric Micro-interactions
        document.querySelectorAll('.glass-panel').forEach(panel => {
            panel.addEventListener('mousemove', (e) => {
                const rect = panel.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                panel.style.setProperty('--mouse-x', `${x}px`);
                panel.style.setProperty('--mouse-y', `${y}px`);
            });
        });
    </script>
